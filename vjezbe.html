<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slovko – Vježbe</title>
  <link rel="stylesheet" href="../shared/style.css">
  <link rel="stylesheet" href="mate.css">
</head>
<body>

  <div class="disclaimer-bar">
    Ovaj alat nije medicinski uređaj. Koristi se isključivo u edukativne svrhe.
  </div>

  <nav class="navbar" role="navigation" aria-label="Glavna navigacija">
    <div class="nav-logo">
      <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <svg width="28" height="28" viewBox="0 0 120 120" aria-hidden="true">
          <rect width="120" height="120" rx="16" fill="#1D9E75"/>
          <rect x="24" y="28" width="72" height="58" rx="6" fill="#E1F5EE"/>
          <rect x="24" y="28" width="10" height="58" rx="5" fill="#9FE1CB"/>
          <circle cx="72" cy="70" r="18" fill="#1D9E75"/>
          <path d="M63 70 L69 76 L82 63" fill="none" stroke="#E1F5EE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="nav-title">Slovko</span>
      </a>
    </div>
    <!-- Navigacija s gumbima min. 44×44px (T9, R007) -->
    <div class="nav-links" role="menubar">
      <a href="index.html" class="nav-btn" role="menuitem">Početna</a>
      <a href="chatbot.html" class="nav-btn" role="menuitem">Chatbot</a>
      <a href="vjezbe.html" class="nav-btn nav-btn-active" role="menuitem" aria-current="page">Vježbe</a>
      <a href="kontakt.html" class="nav-btn" role="menuitem">Kontakt</a>
    </div>
  </nav>

  <main>
    <div class="vjezbe-layout">

      <!-- Lijeva kolona: odabir vježbe (R011 — min 3 tipa) -->
      <aside class="vjezbe-sidebar" aria-label="Odabir vježbe">
        <h2>Odaberi vježbu</h2>
        <div class="vjezba-lista" role="list">

          <!-- Vježba 1 (R011) -->
          <button
            class="vjezba-kartica vjezba-aktivna"
            onclick="odaberiVjezbu(1)"
            id="kartica1"
            aria-pressed="true"
            aria-label="Dopunjavanje rečenica, 10 zadataka, oko 5 minuta"
            role="listitem"
          >
            <div class="vjezba-ikona" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/>
                <line x1="12" y1="4" x2="12" y2="20"/>
              </svg>
            </div>
            <div class="vjezba-info">
              <span class="vjezba-naziv">Dopunjavanje rečenica</span>
              <span class="vjezba-meta">10 zadataka · ~5 min</span>
            </div>
          </button>

          <!-- Vježba 2 (R011) -->
          <button
            class="vjezba-kartica"
            onclick="odaberiVjezbu(2)"
            id="kartica2"
            aria-pressed="false"
            aria-label="Sparivanje slika i riječi, 8 zadataka, oko 4 minute"
            role="listitem"
          >
            <div class="vjezba-ikona" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </div>
            <div class="vjezba-info">
              <span class="vjezba-naziv">Sparivanje slika i riječi</span>
              <span class="vjezba-meta">8 zadataka · ~4 min</span>
            </div>
          </button>

          <!-- Vježba 3 (R011) -->
          <button
            class="vjezba-kartica"
            onclick="odaberiVjezbu(3)"
            id="kartica3"
            aria-pressed="false"
            aria-label="Čitanje s pitanjima, 5 zadataka, oko 7 minuta"
            role="listitem"
          >
            <div class="vjezba-ikona" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              </svg>
            </div>
            <div class="vjezba-info">
              <span class="vjezba-naziv">Čitanje s pitanjima</span>
              <span class="vjezba-meta">5 zadataka · ~7 min</span>
            </div>
          </button>

        </div>
      </aside>

      <!-- Desna kolona: aktivni zadatak -->
      <section class="vjezba-aktivan" aria-label="Aktivna vježba" id="aktivnaVjezba">
        <!-- Generira vjezbe.js -->
        <div class="ucitavanje">Odaberi vježbu za početak!</div>
      </section>

    </div>
  </main>

  <script src="mate.js"></script>
</body>
</html>
