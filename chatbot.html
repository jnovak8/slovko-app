<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slovko – Chatbot Lako</title>
  <link rel="stylesheet" href="../shared/style.css">
  <link rel="stylesheet" href="jan.css">
</head>
<body class="chatbot-page">

  <!-- CHATBOT HEADER -->
  <header class="chat-header">
    <a href="index.html" class="btn-back" aria-label="Natrag na početnu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <div class="chat-header-bot">
      <div class="bot-avatar">
        <svg width="22" height="22" viewBox="0 0 120 120" aria-hidden="true">
          <circle cx="60" cy="60" r="60" fill="#9FE1CB"/>
          <rect x="34" y="38" width="52" height="42" rx="10" fill="#085041"/>
          <rect x="43" y="50" width="14" height="14" rx="4" fill="#E1F5EE"/>
          <circle cx="50" cy="57" r="4" fill="#1D9E75"/>
          <circle cx="52" cy="55" r="1.5" fill="#E1F5EE"/>
          <rect x="63" y="50" width="14" height="14" rx="4" fill="#E1F5EE"/>
          <circle cx="70" cy="57" r="4" fill="#1D9E75"/>
          <circle cx="72" cy="55" r="1.5" fill="#E1F5EE"/>
          <path d="M47 72 Q60 80 73 72" fill="none" stroke="#E1F5EE" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <span class="bot-name">Lako</span>
        <span class="bot-status" id="botStatus">● Dostupan</span>
      </div>
    </div>
    <a href="vjezbe.html" class="btn btn-sm">Vježbe</a>
  </header>

  <!-- PORUKE (R009, R016) -->
  <main class="chat-main">
    <div class="chat-messages" id="chatMessages" role="log" aria-live="polite" aria-label="Razgovor s chatbotom">
      <!-- Početna poruka bota -->
      <div class="msg msg-bot">
        <div class="bot-avatar bot-avatar-sm" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="60" fill="#9FE1CB"/>
            <rect x="34" y="38" width="52" height="42" rx="10" fill="#085041"/>
            <rect x="43" y="50" width="14" height="14" rx="4" fill="#E1F5EE"/>
            <circle cx="50" cy="57" r="4" fill="#1D9E75"/>
            <rect x="63" y="50" width="14" height="14" rx="4" fill="#E1F5EE"/>
            <circle cx="70" cy="57" r="4" fill="#1D9E75"/>
            <path d="M47 72 Q60 80 73 72" fill="none" stroke="#E1F5EE" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="msg-bubble">Bok! Ja sam Lako. Mogu ti pomoći sa školskim zadacima. Što bi htio naučiti danas?</div>
      </div>
    </div>

    <!-- BRZI ODGOVORI (R010) -->
    <div class="quick-replies" id="quickReplies">
      <button class="quick-btn" onclick="sendQuick('ne razumijem')">Ne razumijem</button>
      <button class="quick-btn" onclick="sendQuick('ponovi')">Ponovi</button>
      <button class="quick-btn" onclick="sendQuick('objasni drugačije')">Objasni drugačije</button>
      <button class="quick-btn" onclick="sendQuick('daj primjer')">Daj primjer</button>
    </div>
  </main>

  <!-- INPUT (R007, R017) -->
  <footer class="chat-footer">
    <div class="chat-input-row">
      <label for="chatInput" class="sr-only">Napiši poruku Laki</label>
      <input
        type="text"
        id="chatInput"
        class="chat-input"
        placeholder="Napiši poruku..."
        maxlength="300"
        autocomplete="off"
        aria-label="Polje za unos poruke"
      >
      <button class="btn-send" id="sendBtn" onclick="sendMessage()" aria-label="Pošalji poruku">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </footer>

  <script src="chatbot.js"></script>
</body>
</html>
